server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Docker's internal DNS. `valid=10s` forces re-resolution every 10s
  # so stale IPs don't persist after container restarts.
  resolver 127.0.0.11 valid=10s;

  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  location /api/ {
    # Must be a variable for the resolver to work — nginx only does
    # lazy DNS resolution when the upstream is a variable, not a
    # literal string in proxy_pass.
    set $api_upstream http://api:8080;
    proxy_pass         $api_upstream;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}