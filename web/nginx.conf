# nginx config for the production web container.
#
# Responsibilities:
#   1. Serve the Vite-built static assets from /usr/share/nginx/html.
#   2. Proxy /api/* to the Go backend container (resolved by docker-compose
#      service name). This keeps everything same-origin from the browser's
#      perspective — no CORS, no credentials juggling.
#   3. SPA fallback: unknown paths that don't look like API routes fall
#      through to index.html.

server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Long-cache fingerprinted assets; Vite emits content-hashed filenames so
  # this is safe.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Proxy API traffic to the backend container. `api` is the docker-compose
  # service name; resolution happens via Docker's internal DNS.
  location /api/ {
    proxy_pass         http://api:8080;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
  }

  # SPA fallback for everything else.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
